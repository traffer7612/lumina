# Ceitnot — Tenderly Alert Configuration
# -----------------------------------------------
# Reference config for setting up Tenderly Alerts via the Tenderly Dashboard
# or the Tenderly CLI (tenderly alerts create).
#
# Required substitutions (replace before importing):
#   ${ENGINE_PROXY_ADDRESS}     - CeitnotEngine proxy address
#   ${ORACLE_RELAY_V2_ADDRESS}  - OracleRelayV2 address
#   ${ALERT_WEBHOOK_URL}        - Your alert webhook endpoint
#
# Network ID for Arbitrum One: 42161
# Tenderly CLI setup: https://docs.tenderly.co/monitoring/alerts

version: "1"
project:
  name: "ceitnot-protocol"
  slug: "ceitnot-protocol"  # update to match your Tenderly project slug

alerts:

  # ─── 1. Large Liquidation ───────────────────────────────────────────────────
  - name: "Ceitnot: Large Liquidation"
    description: "Fires whenever a Liquidated event is emitted on CeitnotEngine."
    enabled: true
    network_id: "42161"
    contract_address: "${ENGINE_PROXY_ADDRESS}"
    trigger:
      type: "contract_event"
      event_signature: "Liquidated(address,address,uint256,uint256,uint256)"
    destinations:
      - type: "webhook"
        webhook_url: "${ALERT_WEBHOOK_URL}"
    notification:
      title: "[CEITNOT] Large Liquidation"
      message: "Liquidation detected: user={{0}}, liquidator={{1}}, marketId={{2}}, repayAmount={{3}}, collateralSeized={{4}}"

  # ─── 2. Bad Debt Realized ───────────────────────────────────────────────────
  - name: "Ceitnot: Bad Debt Realized"
    description: "Fires when a position cannot be fully covered (bad debt written off)."
    enabled: true
    network_id: "42161"
    contract_address: "${ENGINE_PROXY_ADDRESS}"
    trigger:
      type: "contract_event"
      event_signature: "BadDebtRealized(address,uint256,uint256)"
    destinations:
      - type: "webhook"
        webhook_url: "${ALERT_WEBHOOK_URL}"
    notification:
      title: "[CEITNOT CRITICAL] Bad Debt Realized"
      message: "Bad debt written off: user={{0}}, marketId={{1}}, amount={{2}}"

  # ─── 3. Oracle Circuit Breaker ───────────────────────────────────────────────
  - name: "Ceitnot: Oracle Price Deviation"
    description: "Fires when the oracle circuit breaker trips or resets."
    enabled: true
    network_id: "42161"
    contract_address: "${ORACLE_RELAY_V2_ADDRESS}"
    trigger:
      type: "contract_event"
      event_signature: "PriceDeviationBreached(uint256,uint256,uint256)"
    destinations:
      - type: "webhook"
        webhook_url: "${ALERT_WEBHOOK_URL}"
    notification:
      title: "[CEITNOT CRITICAL] Oracle Circuit Breaker Tripped"
      message: "Price deviation exceeded threshold: lastPrice={{0}}, newPrice={{1}}, deviationBps={{2}}"

  # ─── 4. Protocol Paused ──────────────────────────────────────────────────────
  - name: "Ceitnot: Protocol Paused"
    description: "Fires whenever pause state changes on CeitnotEngine."
    enabled: true
    network_id: "42161"
    contract_address: "${ENGINE_PROXY_ADDRESS}"
    trigger:
      type: "contract_event"
      event_signature: "PausedSet(bool)"
    destinations:
      - type: "webhook"
        webhook_url: "${ALERT_WEBHOOK_URL}"
    notification:
      title: "[CEITNOT] Pause State Changed"
      message: "CeitnotEngine paused state set to: {{0}}"

  # ─── 5. Emergency Shutdown ───────────────────────────────────────────────────
  - name: "Ceitnot: Emergency Shutdown"
    description: "Fires whenever emergency shutdown state changes."
    enabled: true
    network_id: "42161"
    contract_address: "${ENGINE_PROXY_ADDRESS}"
    trigger:
      type: "contract_event"
      event_signature: "EmergencyShutdownSet(bool)"
    destinations:
      - type: "webhook"
        webhook_url: "${ALERT_WEBHOOK_URL}"
    notification:
      title: "[CEITNOT CRITICAL] Emergency Shutdown State Changed"
      message: "CeitnotEngine emergency shutdown set to: {{0}}"

  # ─── 6. Admin Transfer ───────────────────────────────────────────────────────
  - name: "Ceitnot: Admin Transferred"
    description: "Fires whenever the admin role is transferred on CeitnotEngine or registry."
    enabled: true
    network_id: "42161"
    contract_address: "${ENGINE_PROXY_ADDRESS}"
    trigger:
      type: "contract_event"
      event_signature: "AdminTransferred(address,address)"
    destinations:
      - type: "webhook"
        webhook_url: "${ALERT_WEBHOOK_URL}"
    notification:
      title: "[CEITNOT WARNING] Admin Transferred"
      message: "CeitnotEngine admin changed from {{0}} to {{1}}. Verify this is authorised."
